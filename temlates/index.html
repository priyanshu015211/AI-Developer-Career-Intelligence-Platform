<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Analyzer</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      background: #fafaf8;
      color: #222;
      line-height: 1.6;
    }

    h1 { font-size: 24px; margin-bottom: 4px; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 30px; }

    .search {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
    }

    input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
      font-family: Georgia, serif;
    }

    button {
      padding: 9px 18px;
      background: #222;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { background: #444; }

    #error {
      color: #b00;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .profile {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid #ddd;
    }

    .profile img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
    }

    .profile-info h2 { margin: 0 0 4px; font-size: 20px; }
    .profile-info .handle { color: #666; font-size: 13px; }
    .profile-info .bio { font-size: 14px; margin-top: 6px; color: #444; }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat { text-align: center; }
    .stat .num { font-size: 22px; font-weight: bold; }
    .stat .lbl { font-size: 12px; color: #666; }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 12px;
    }

    .lang-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 30px;
    }

    .lang-tag {
      padding: 4px 10px;
      background: #eee;
      border-radius: 20px;
      font-size: 13px;
      color: #333;
    }

    .repos { list-style: none; padding: 0; margin: 0; }

    .repo {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .repo a {
      font-size: 15px;
      font-weight: bold;
      color: #0066cc;
      text-decoration: none;
    }

    .repo a:hover { text-decoration: underline; }

    .repo .desc {
      font-size: 13px;
      color: #555;
      margin: 3px 0 6px;
    }

    .repo .meta {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    #result { display: none; }
  </style>
</head>
<body>

  <h1>GitHub Profile Analyzer</h1>
  <p class="sub">Paste a GitHub username and see what they've actually built.</p>

  <div class="search">
    <input id="username" type="text" placeholder="e.g. torvalds" />
    <button onclick="analyze()">Analyze</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>

  <script>
    document.getElementById("username").addEventListener("keydown", e => {
      if (e.key === "Enter") analyze();
    });

    async function analyze() {
      const username = document.getElementById("username").value.trim();
      if (!username) return;

      const errEl = document.getElementById("error");
      const resEl = document.getElementById("result");
      errEl.style.display = "none";
      resEl.style.display = "none";
      resEl.innerHTML = "Loading...";
      resEl.style.display = "block";

      try {
        const res = await fetch(`/api/profile/${username}`);
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || "Something went wrong");
        }

        const d = await res.json();
        resEl.innerHTML = render(d);
      } catch (e) {
        resEl.style.display = "none";
        errEl.textContent = e.message;
        errEl.style.display = "block";
      }
    }

    function render(d) {
      const langs = d.languages.map(l =>
        `<span class="lang-tag">${l.name} ${l.pct}%</span>`
      ).join("");

      const repos = d.repos.map(r => `
        <li class="repo">
          <a href="${r.url}" target="_blank">${r.name}</a>
          ${r.description ? `<div class="desc">${r.description}</div>` : ""}
          <div class="meta">
            ${r.language ? `<span>${r.language}</span>` : ""}
            <span>★ ${r.stars}</span>
            <span>⑂ ${r.forks}</span>
            ${r.topics.map(t => `<span>#${t}</span>`).join("")}
          </div>
        </li>
      `).join("");

      return `
        <div class="profile">
          <img src="${d.avatar_url}" alt="${d.login}" />
          <div class="profile-info">
            <h2>${d.name}</h2>
            <div class="handle">@${d.login}${d.location ? " · " + d.location : ""}</div>
            ${d.bio ? `<div class="bio">${d.bio}</div>` : ""}
          </div>
        </div>

        <div class="stats">
          <div class="stat"><div class="num">${d.public_repos}</div><div class="lbl">Repos</div></div>
          <div class="stat"><div class="num">${d.followers}</div><div class="lbl">Followers</div></div>
          <div class="stat"><div class="num">${d.following}</div><div class="lbl">Following</div></div>
          <div class="stat"><div class="num">${d.total_stars}</div><div class="lbl">Total Stars</div></div>
        </div>

        ${langs ? `<div class="section-title">Top Languages</div><div class="lang-row">${langs}</div>` : ""}

        <div class="section-title">Repositories (${d.repos.length} shown)</div>
        <ul class="repos">${repos}</ul>
      `;
    }
  </script>
</body>
</html>
